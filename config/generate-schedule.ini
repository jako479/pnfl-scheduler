[Settings]
# Maximum time (seconds) the solver is allowed to spend on a single schedule.
# Default is 3600.
TimeLimit = 3600


[ConferenceRanking]
# Final standings from the previous season, used for strength-of-schedule
# constraints. List all 9 teams per conference, one per line, ranked 1st
# through 9th by line order (first line = best finish).
AFC =
    New England
    Miami
    Jacksonville
    Buffalo
    Cincinnati
    Pittsburgh
    Denver
    Los Angeles
    Las Vegas
NFC =
    Washington
    Atlanta
    New York
    Philadelphia
    Chicago
    Minnesota
    San Francisco
    Green Bay
    Seattle
