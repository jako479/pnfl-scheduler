[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "pnfl-scheduler"
version = "0.1.0"
description = "Generates the seasonal game schedule for the PNFL."
authors = [{ name = "Brian J" }]
readme = "README.md"
requires-python = ">=3.10"
dependencies = ["ortools>=9.10"]

[project.optional-dependencies]
dev = ["pytest", "ruff"]

[project.entry-points."pnfl.commands"]
generate-schedule = "pnfl_scheduler.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--durations=3"

[tool.ruff]
line-length = 100

[tool.ruff.format]
quote-style = "double"
